<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory Droid Session Manager</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div class="header">
  <a class="toggle-btn header-github" id="repoHeaderLink" href="https://github.com/r0k1n-c/FactoryDroidSession-Manager" target="_blank" rel="noreferrer" title="GitHub" aria-label="GitHub">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
      <path d="M8 0C3.58 0 0 3.73 0 8.33c0 3.68 2.29 6.8 5.47 7.9.4.08.55-.18.55-.39 0-.19-.01-.82-.01-1.49-2.01.45-2.53-.51-2.69-.98-.09-.24-.48-.98-.82-1.18-.28-.15-.68-.54-.01-.55.63-.01 1.08.6 1.23.85.72 1.27 1.87.91 2.33.69.07-.54.28-.91.51-1.12-1.78-.21-3.64-.92-3.64-4.09 0-.9.31-1.64.82-2.22-.08-.21-.36-1.05.08-2.18 0 0 .67-.22 2.2.85a7.32 7.32 0 012-.28c.68 0 1.36.1 2 .28 1.53-1.08 2.2-.85 2.2-.85.44 1.13.16 1.97.08 2.18.51.58.82 1.31.82 2.22 0 3.18-1.87 3.88-3.65 4.09.29.26.54.76.54 1.54 0 1.11-.01 2-.01 2.28 0 .22.15.48.55.39A8.37 8.37 0 0016 8.33C16 3.73 12.42 0 8 0z"/>
    </svg>
  </a>
  <div class="header-left">
    <h1 id="appTitle"></h1>
    <div class="stats-bar" id="globalStats"></div>
  </div>
  <div class="header-right">
    <button class="toggle-btn" id="shortcutHelpBtn" onclick="showShortcutHelp()" title="Shortcuts" aria-label="Shortcuts">?</button>
    <button class="toggle-btn lang-btn" id="langBtn" onclick="toggleLang()" title="Switch language"></button>
    <button class="toggle-btn" id="themeBtn" onclick="toggleTheme()" title="Switch theme"></button>
  </div>
</div>

<div class="container">
  <div class="section-head">
    <div class="tabs">
      <div class="tab active" data-tab="sessions" onclick="switchTab('sessions')" data-i18n="tabSessions"></div>
      <div class="tab" data-tab="analytics" onclick="switchTab('analytics')" data-i18n="tabAnalytics"></div>
    </div>
    <div class="section-head-controls">
      <div class="toolbar-status" id="refreshStatus"></div>
      <label class="refresh-control">
        <span class="refresh-control-label" data-i18n="refreshEveryLabel"></span>
        <span class="refresh-input-wrap">
          <input class="refresh-input" id="refreshIntervalInput" type="number" min="1" max="3600" step="1" onchange="setRefreshInterval(this.value)">
          <span class="refresh-unit" data-i18n="secondsUnit"></span>
        </span>
      </label>
    </div>
  </div>

  <div id="tab-sessions">
    <div class="toolbar">
      <label class="toolbar-search">
        <span class="toolbar-search-icon">⌕</span>
        <input class="search-box" id="searchInput" oninput="handleSearchInput()" data-i18n-ph="searchPlaceholder">
      </label>
      <select class="sort-select" id="sortSelect" onchange="setSort(this.value)"></select>
      <button class="btn-toolbar-action" id="favoritesOnlyBtn" onclick="toggleFavoritesOnly()" data-i18n="favoritesOnly"></button>
      <button class="btn-toolbar-action" onclick="exportFilteredSessions('json')" data-i18n="exportListJson"></button>
      <button class="btn-toolbar-action" onclick="exportFilteredSessions('md')" data-i18n="exportListMarkdown"></button>
      <button class="btn-clear-empty" onclick="clearEmptySessions()" data-i18n="clearEmpty"></button>
      <div class="view-toggle">
        <button class="active" onclick="setView('grid',this)" data-i18n="viewGrid"></button>
        <button onclick="setView('list',this)" data-i18n="viewList"></button>
      </div>
    </div>
    <div class="toolbar-subrow" id="sessionActionBar"></div>
    <div class="ws-pills" id="wsPills"></div>
    <div id="sessionContainer" class="grid-view">
      <div class="grid" id="sessionGrid"></div>
    </div>
  </div>

  <div id="tab-analytics" style="display:none">
    <div class="charts" id="chartsArea"></div>
  </div>
</div>

<footer class="app-footer">
  <div class="container">
    <div class="app-meta-bar app-footer-meta" id="appMetaBar"></div>
  </div>
</footer>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2 id="modalTitle"></h2>
      <button class="modal-close" onclick="hideModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3 data-i18n="deleteTitle"></h3>
    <p id="confirmText"></p>
    <div class="btns">
      <button class="btn-cancel" onclick="hideConfirm()" data-i18n="cancel"></button>
      <button class="btn-danger" id="confirmDeleteBtn" data-i18n="delete"></button>
    </div>
  </div>
</div>

<button class="scroll-top-btn" id="scrollTopBtn" onclick="scrollToTop()" title="回到顶部" aria-label="回到顶部">
  <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
    <path d="M8.53 3.22l4.25 4.25a.75.75 0 11-1.06 1.06L8.75 5.56V13a.75.75 0 01-1.5 0V5.56L4.28 8.53a.75.75 0 11-1.06-1.06l4.25-4.25a.75.75 0 011.06 0z"/>
  </svg>
</button>

<div class="toast-region" id="toastRegion" aria-live="polite" aria-atomic="true"></div>

<script src="assets/app.js"></script>
</body>
</html>
